<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#151C2B"/>
      <stop offset="100%" style="stop-color:#0D1320"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  <!-- Subtle border -->
  <rect x="0.75" y="0.75" width="30.5" height="30.5" rx="5.5" fill="none" stroke="#28334D" stroke-width="0.75"/>

  <!-- AM text, bold, centered, amber -->
  <text
    x="16"
    y="22"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="700"
    font-size="16"
    letter-spacing="1"
    fill="#FFB454">AM</text>

  <!-- Thin amber underline accent -->
  <line x1="7" y1="25.5" x2="25" y2="25.5" stroke="#FFB454" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
</svg>
